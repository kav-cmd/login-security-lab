<!--
Feature 5: Modern UI Redesign - MFA verification page
Dark-mode industrial aesthetic with IBM Plex Mono and Inter fonts
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFA Verification - SecureLab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .brand-header {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 24px;
            font-weight: 700;
            color: #e5e7eb;
        }
        .mfa-container {
            background: #111118;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #1e1e2e;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.15), 0 20px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 420px;
            z-index: 1;
        }
        h1 {
            text-align: center;
            color: #e5e7eb;
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: 700;
        }
        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            color: #3b82f6;
            line-height: 1.6;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #9ca3af;
            font-weight: 500;
            font-size: 14px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            background: #0a0a0f;
            border: 1px solid #1e1e2e;
            border-radius: 8px;
            font-size: 20px;
            text-align: center;
            letter-spacing: 8px;
            color: #e5e7eb;
            transition: all 0.2s;
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body>
    <div class="brand-header">🛡 SecureLab</div>
    <div class="mfa-container">
        <h1>🔐 Two-Factor Authentication</h1>
        <div class="info-box">
            📧 A 6-digit verification code has been sent to your registered email/device.
            Check your console for the OTP code (test environment).
        </div>
        <form method="POST" action="/mfa_verify">
            <div class="form-group">
                <label for="otp">Enter 6-Digit Code</label>
                <input type="text" id="otp" name="otp" maxlength="6" pattern="[0-9]{6}" required autofocus>
            </div>
            <button type="submit">Verify</button>
        </form>
    </div>
</body>
</html>
