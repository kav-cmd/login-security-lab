<!--
Feature 5: Modern UI Redesign - CAPTCHA verification page
Dark-mode industrial aesthetic with IBM Plex Mono and Inter fonts
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTCHA Verification - SecureLab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .brand-header {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 24px;
            font-weight: 700;
            color: #e5e7eb;
        }
        .captcha-container {
            background: #111118;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #1e1e2e;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.15), 0 20px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 420px;
            z-index: 1;
        }
        h1 {
            text-align: center;
            color: #e5e7eb;
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: 700;
        }
        .captcha-box {
            background: #0a0a0f;
            border: 1px solid #1e1e2e;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 24px;
        }
        .captcha-question {
            font-size: 24px;
            font-weight: 600;
            color: #3b82f6;
            font-family: 'IBM Plex Mono', monospace;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #9ca3af;
            font-weight: 500;
            font-size: 14px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: #0a0a0f;
            border: 1px solid #1e1e2e;
            border-radius: 8px;
            font-size: 15px;
            color: #e5e7eb;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        .warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #f59e0b;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="brand-header">🛡 SecureLab</div>
    <div class="captcha-container">
        <button class="vuln-button" onclick="alert('⚠️ CAPTCHA Vulnerability\n\nMath CAPTCHAs are machine-solvable in <1ms.\n\nA script can:\n• Parse the question from HTML\n• Compute the answer instantly\n• Submit faster than any human\n\nFix: Use proof-of-work CAPTCHAs (Cloudflare Turnstile, hCaptcha) that cannot be solved by reading the DOM.\n\nSee: attack_captcha_bypass.py')">
            🔍 Show Vulnerability
        </button>
        <h1>🤖 CAPTCHA Verification</h1>
        <div class="warning">
            Multiple failed login attempts detected. Please solve the CAPTCHA to continue.
        </div>
        <div class="captcha-box">
            <div class="captcha-question">{{ captcha_question }}</div>
        </div>
        <form method="POST" action="/login">
            <input type="hidden" name="username" value="{{ username }}">
            <div class="form-group">
                <label for="captcha_answer">Your Answer</label>
                <input type="text" id="captcha_answer" name="captcha_answer" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Verify & Login</button>
        </form>
    </div>
</body>
</html>
